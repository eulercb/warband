name: CI

# Run the full quality suite on every push to main and on every pull request.
# `workflow_dispatch` allows manual runs from the Actions tab.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Only the latest run per ref needs to finish; cancel superseded in-progress
# runs to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Read-only token: CI only needs to check out and validate the code.
permissions:
  contents: read

jobs:
  # Static analysis, unit tests and the production build. These gates are fast
  # and gate every change.
  quality:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check (Prettier)
        # Advisory only: the committed source does not yet fully conform to
        # .prettierrc, so a hard failure here would block unrelated changes.
        # Run `npm run format` locally to fix drift. Remove continue-on-error
        # once the tree is fully formatted to make this a blocking gate.
        continue-on-error: true
        run: npx prettier --check "src/**/*.{ts,tsx}"

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Test (Vitest)
        run: npm test

      - name: Build (tsc + Vite)
        run: npm run build

  # Headless end-to-end smoke test: build, serve the bundle and drive a solo
  # host fight through the real app in Chromium. Kept in its own job so the
  # browser download and any runtime flakiness are isolated from the fast gates.
  smoke:
    name: Smoke (headless browser)
    runs-on: ubuntu-latest
    env:
      # Collect the smoke screenshots somewhere we can upload them on failure.
      SHOT_DIR: ${{ runner.temp }}/smoke-shots
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Playwright
        # Installs the exact Chromium build pinned by playwright-core, so
        # chromium.executablePath() below resolves to it.
        run: npx playwright-core install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run smoke test
        run: |
          mkdir -p "$SHOT_DIR"
          # Serve the production build in the background (vite preview -> :4173).
          npm run preview &
          PREVIEW_PID=$!
          # Wait for the preview server to start accepting connections.
          for i in $(seq 1 30); do
            curl -sf http://localhost:4173/ >/dev/null && break
            sleep 1
          done
          # Point the smoke runner at the Chromium we just installed.
          CHROMIUM_PATH="$(node -e "console.log(require('playwright-core').chromium.executablePath())")"
          export CHROMIUM_PATH
          set +e
          npm run smoke
          code=$?
          set -e
          kill "$PREVIEW_PID" 2>/dev/null || true
          exit $code

      - name: Upload smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: ${{ runner.temp }}/smoke-shots
          if-no-files-found: ignore
